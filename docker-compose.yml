services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@ventasdb.conowcgkyqp9.us-east-1.rds.amazonaws.com:5432/ventasdb
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-}
    depends_on:
      - app-pagos
      - postgres
    restart: always

  app-pagos:
    build: ./app-pagos
    container_name: app-pagos
    ports:
      - "8002:8002"
    env_file:
      - ./app-pagos/.env

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  file-service:
    build: ./file-service
    container_name: file-service
    ports:
      - "8004:8004"
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-}
    restart: always

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8003:8003"
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
    restart: always

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ventasdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: