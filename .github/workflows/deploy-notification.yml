name: Deploy Notification Service

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
  workflow_dispatch:

env:
  ECR_REGISTRY: 642528007536.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: notification-service

jobs:
  deploy:
    name: Build, Push ECR y Deploy EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push imagen a ECR
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./notification-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy en EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > /tmp/key.pem
          chmod 600 /tmp/key.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/key.pem ec2-user@${{ secrets.EC2_HOST }} << ENDSSH
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker stop notification-service 2>/dev/null || true
            docker rm notification-service 2>/dev/null || true
            docker run -d \
              --name notification-service \
              --restart always \
              -p 8003:8003 \
              --env-file /home/ec2-user/notification-service/.env \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest
            echo "--- Contenedor activo ---"
            docker ps | grep notification-service
          ENDSSH
