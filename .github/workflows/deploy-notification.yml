name: Deploy Notification Service

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
  workflow_dispatch:

env:
  ECR_REGISTRY: 642528007536.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: notification-service

jobs:
  deploy:
    name: Build, Push ECR y Deploy EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push imagen a ECR
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./notification-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Obtener Instance ID
        id: get_instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${{ secrets.EC2_HOST }}" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Escribir .env y redeploy en EC2 via SSM
        run: |
          INSTANCE_ID="${{ steps.get_instance.outputs.instance_id }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "echo SMTP_HOST=smtp-mail.outlook.com > /home/ec2-user/notification-service/.env",
              "echo SMTP_PORT=587 >> /home/ec2-user/notification-service/.env",
              "echo SMTP_USER=${{ secrets.NS_SMTP_USER }} >> /home/ec2-user/notification-service/.env",
              "echo SMTP_PASSWORD=${{ secrets.NS_SMTP_PASSWORD }} >> /home/ec2-user/notification-service/.env",
              "echo SMTP_SENDER_EMAIL=${{ secrets.NS_SMTP_SENDER_EMAIL }} >> /home/ec2-user/notification-service/.env",
              "echo TWILIO_ACCOUNT_SID=${{ secrets.NS_TWILIO_ACCOUNT_SID }} >> /home/ec2-user/notification-service/.env",
              "echo TWILIO_AUTH_TOKEN=${{ secrets.NS_TWILIO_AUTH_TOKEN }} >> /home/ec2-user/notification-service/.env",
              "echo TWILIO_WHATSAPP_FROM=${{ secrets.NS_TWILIO_WHATSAPP_FROM }} >> /home/ec2-user/notification-service/.env",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 642528007536.dkr.ecr.us-east-1.amazonaws.com",
              "docker pull 642528007536.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest",
              "docker stop notification-service 2>/dev/null || true",
              "docker rm notification-service 2>/dev/null || true",
              "docker run -d --name notification-service --restart always -p 8003:8003 --env-file /home/ec2-user/notification-service/.env 642528007536.dkr.ecr.us-east-1.amazonaws.com/notification-service:latest",
              "docker ps | grep notification-service"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Comando SSM: $COMMAND_ID"
          sleep 40

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "[StatusDetails, StandardOutputContent, StandardErrorContent]" \
            --output text