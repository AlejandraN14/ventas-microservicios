name: Deploy Notification Service to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'notification-service/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar archivos al servidor EC2
        run: |
          scp -i ~/.ssh/deploy_key -r notification-service/ \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: Construir y levantar el servicio
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd /home/ec2-user/notification-service

            cat > .env <<EOF
            AWS_REGION=us-east-1
            AWS_ACCESS_KEY_ID=${{ secrets.NS_AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.NS_AWS_SECRET_ACCESS_KEY }}
            SES_SENDER_EMAIL=${{ secrets.NS_SES_SENDER_EMAIL }}
            TWILIO_ACCOUNT_SID=${{ secrets.NS_TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.NS_TWILIO_AUTH_TOKEN }}
            TWILIO_WHATSAPP_FROM=${{ secrets.NS_TWILIO_WHATSAPP_FROM }}
            EOF

            docker stop notification-service 2>/dev/null || true
            docker rm notification-service 2>/dev/null || true
            docker build -t notification-service:latest .
            docker run -d \
              --name notification-service \
              --restart always \
              -p 8003:8003 \
              --env-file .env \
              notification-service:latest

            echo "Servicio desplegado:"
            docker ps | grep notification-service
          ENDSSH
