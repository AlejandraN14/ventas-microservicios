name: Deploy File Service

on:
  push:
    branches:
      - main
    paths:
      - 'file-service/**'
  workflow_dispatch:

env:
  ECR_REGISTRY: 548932260893.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: ventas-file-service

jobs:
  deploy:
    name: Build, Push ECR y Deploy EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_EK }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_EK }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY

      - name: Build y push imagen a ECR
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest ./file-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy en EC2 via SSM
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_EK }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${{ secrets.EC2_HOST_EK }}" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Instancia: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest\",
              \"docker stop file-service 2>/dev/null || true\",
              \"docker rm file-service 2>/dev/null || true\",
              \"docker run -d --name file-service --restart always -p 8004:8004 -e AWS_REGION=us-east-1 -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID_EK }} -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY_EK }} -e S3_BUCKET=${{ secrets.S3_BUCKET_EK }} -e NOTIFICATION_SERVICE_URL=http://172.17.0.1:8003 -e AUDIT_SERVICE_URL=http://172.17.0.1:8005 $ECR_REGISTRY/$ECR_REPOSITORY:latest\",
              \"docker ps | grep file-service\"
            ]}" \
            --query "Command.CommandId" \
            --output text)

          echo "Comando SSM: $COMMAND_ID"
          sleep 40

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "[StatusDetails, StandardOutputContent, StandardErrorContent]" \
            --output text
