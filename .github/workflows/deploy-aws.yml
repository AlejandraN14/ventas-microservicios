name: Build and Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 548932260893.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: ventas-cluster

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            context: frontend
            repository: ventas-frontend
          - name: backend
            context: backend
            repository: ventas-backend
          - name: app-pagos
            context: app-pagos
            repository: ventas-app-pagos

    outputs:
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      backend_image: ${{ steps.images.outputs.backend_image }}
      app_pagos_image: ${{ steps.images.outputs.app_pagos_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_EK }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_EK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.repository }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service.repository }}:latest

      - name: Export image URI
        id: images
        run: |
          IMAGE="${ECR_REGISTRY}/${{ matrix.service.repository }}:${GITHUB_SHA}"
          KEY="${{ matrix.service.name }}_image"
          KEY="${KEY//-/_}"
          echo "$KEY=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        service:
          - name: frontend
            ecs_service: ventas-frontend-service
            task_definition: aws/task-definition-frontend.json
            container: frontend
            image: ventas-frontend
          - name: backend
            ecs_service: ventas-backend-service
            task_definition: aws/task-definition-backend.json
            container: backend
            image: ventas-backend
          - name: app-pagos
            ecs_service: ventas-app-pagos-service
            task_definition: aws/task-definition-app-pagos.json
            container: app-pagos
            image: ventas-app-pagos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_EK }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_EK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ matrix.service.task_definition }}
          container-name: ${{ matrix.service.container }}
          image: ${{ env.ECR_REGISTRY }}/${{ matrix.service.image }}:${{ github.sha }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ matrix.service.ecs_service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
